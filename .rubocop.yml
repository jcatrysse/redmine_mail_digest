# frozen_string_literal: true

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.0
  SuggestExtensions: false
  Include:
    - 'app/**/*.rb'
    - 'config/**/*.rb'
    - 'db/**/*.rb'
    - 'lib/**/*.rb'
    - 'spec/**/*.rb'
  Exclude:
    - 'tmp/**/*'
    - 'vendor/**/*'

Style/Documentation:
  Enabled: false


Metrics:
  Enabled: false

Layout/HashAlignment:
  Enabled: false

Layout/IndentationConsistency:
  Enabled: false

Style/EmptyMethod:
  Enabled: false

Style/IfUnlessModifier:
  Enabled: false

Style/MultilineIfModifier:
  Enabled: false

Style/Semicolon:
  Enabled: false

Style/StringLiterals:
  Enabled: false

Style/SymbolArray:
  Enabled: false

Style/SymbolProc:
  Enabled: false

Layout/ExtraSpacing:
  Enabled: false

Layout/LineLength:
  Enabled: false

Layout/SpaceBeforeBlockBraces:
  Enabled: false

Lint/IneffectiveAccessModifier:
  Enabled: false

Lint/RedundantDirGlobSort:
  Enabled: false

Lint/UnusedBlockArgument:
  Enabled: false

Lint/UselessAssignment:
  Enabled: false

Naming/MethodParameterName:
  Enabled: false

Style/BlockDelimiters:
  Enabled: false

Style/ComparableClamp:
  Enabled: false

Style/ConditionalAssignment:
  Enabled: false

Style/ExpandPathArguments:
  Enabled: false

Style/FormatStringToken:
  Enabled: false

Style/GuardClause:
  Enabled: false

Style/NumericPredicate:
  Enabled: false

Style/RedundantAssignment:
  Enabled: false

Style/RescueModifier:
  Enabled: false

Style/WordArray:
  Enabled: false

Layout/EmptyLineAfterGuardClause:
  Enabled: false

Layout/EmptyLines:
  Enabled: false

Layout/EmptyLinesAroundBlockBody:
  Enabled: false

Layout/MultilineMethodCallIndentation:
  Enabled: false

Layout/SpaceAroundOperators:
  Enabled: false

Lint/AmbiguousOperatorPrecedence:
  Enabled: false

Lint/DuplicateBranch:
  Enabled: false

Lint/UnusedMethodArgument:
  Enabled: false

Style/EmptyElse:
  Enabled: false

Style/MultilineTernaryOperator:
  Enabled: false

Style/RedundantLineContinuation:
  Enabled: false

Style/RegexpLiteral:
  Enabled: false

Style/SoleNestedConditional:
  Enabled: false

Style/TrivialAccessors:
  Enabled: false
