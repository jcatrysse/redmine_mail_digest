  label_filter_group_narrow: "Luego acotar las incidencias encontradas"
  hint_personalization: "Estas acotan la lista de cada destinatario a sus propias incidencias. Se aplican además de los modos de destinatarios; los modos Asignados / Autores / Seguidores ya se acotan por sí mismos, por lo que las necesitará sobre todo con modos amplios como 'Todos los miembros del proyecto'."
  hint_timezone: "Zona horaria para interpretar la hora de envío y las ventanas de tiempo. Por defecto, la zona horaria global de Redmine."
