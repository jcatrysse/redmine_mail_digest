  hint_schedule: "El resumen se enviará a la hora especificada, en los días programados."
  hint_query: "Restringe todo el resumen a las incidencias que coincidan con la consulta guardada, aplicada con Y además de las opciones de abajo. La consulta debe ser pública o pertenecer a este proyecto."
  hint_filters: "Cada opción marcada añade sus incidencias coincidentes al resumen (lógica O). 'Vencidas' y 'Próximas a vencer' ya se limitan a incidencias abiertas — no necesita marcar también 'Incidencias abiertas'. No marcar nada para incluir todas las incidencias del proyecto."
  hint_recipients: "Los modos de destinatarios se combinan (se incluye a un usuario que coincida con cualquiera de los modos seleccionados). Cada destinatario recibe un correo personalizado con solo las incidencias que tiene permiso para ver."
  hint_send_empty: "Si se marca, se envía un correo incluso cuando ninguna incidencia coincide con los filtros configurados. Atención: con un modo de destinatarios amplio (p. ej. todos los miembros del proyecto) y un filtro de personalización, esto puede enviar un resumen vacío a cada destinatario."
  hint_email_subject: "Admite tokens: {project}, {date}, {rule_name}, {issues_count}. Dejar en blanco para usar el asunto predeterminado."
  hint_email_intro: "Admite el mismo formato de texto que las páginas wiki."
  hint_max_issues: "Nota: el resumen incluirá como máximo %{max} incidencias por correo (configurado globalmente)."
