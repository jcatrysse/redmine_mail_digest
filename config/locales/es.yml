  hint_send_time: "Formato 24 horas, p. ej. 08:00"
  hint_grace_window: "Si el cron se ejecuta tarde, el resumen se envía de todos modos dentro de esta ventana. Tras expirar la ventana, esa ocurrencia se omite."
  hint_manual_schedule: "Esta regla nunca se ejecuta automáticamente. Actívela con: rake redmine:issue_digest:send RULE_ID=%{id} MANUAL=1"
  hint_interval_anchor: "El intervalo se cuenta desde la fecha de inicio (o la fecha de creación de la regla si no se ha establecido fecha de inicio)."
  hint_interval_time_window: "Solo activar en este rango horario (HH:MM, formato 24h). Dejar ambos vacíos para todo el día."
  hint_interval_days_filter: "Solo activar en estos días de la semana. Dejar todo sin marcar significa todos los días."
  hint_subdaily_cron: "La frecuencia depende de la frecuencia de ejecución del cron digest:send."
  hint_since_last_run: "Limita el digest a incidencias creadas o actualizadas después de la última ejecución exitosa. Marca ambas para incluir cualquier cosa nueva o modificada. Útil para flujos de alerta ante cambios. Si también está activado 'Enviar aunque no haya incidencias', recibirás un correo en cada ejecución, incluso cuando no haya cambios."
  hint_recipient_relationship_modes: "Estos modos eligen destinatarios entre las incidencias coincidentes y limitan el resumen de cada uno a las incidencias en las que es, respectivamente, el asignado, el autor o el seguidor. Un usuario seleccionado además mediante un modo amplio (p. ej., todos los miembros del proyecto) recibe en cambio la lista completa."
