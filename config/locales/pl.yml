  hint_recipient_relationship_modes: "Te tryby wybierają odbiorców spośród pasujących zadań i ograniczają podsumowanie każdego z nich do zadań, w których jest on odpowiednio przypisanym, autorem lub obserwującym. Użytkownik wybrany dodatkowo przez tryb szeroki (np. wszyscy członkowie projektu) otrzymuje natomiast pełną listę."
