name: Plugin Specs (Redmine 6.1, MySQL)

on:
  workflow_dispatch:

jobs:
  test:
    name: RSpec tests (MySQL)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: redmine
          MYSQL_DATABASE: redmine_test
          MYSQL_USER: redmine
          MYSQL_PASSWORD: redmine
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -predmine"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      RAILS_ENV: test

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Clone Redmine 6.1
        run: |
          git clone --depth 1 --branch 6.1-stable https://github.com/redmine/redmine.git redmine
          mkdir -p redmine/plugins/$(basename "$GITHUB_WORKSPACE")
          rsync -a --exclude redmine/ --exclude .git/ ./ redmine/plugins/$(basename "$GITHUB_WORKSPACE")/

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y build-essential default-libmysqlclient-dev nodejs

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.9
          bundler-cache: false
          working-directory: redmine

      - name: Configure test database
        run: |
          cat > config/database.yml <<EOF
          test:
            adapter: mysql2
            database: redmine_test
            host: 127.0.0.1
            port: 3306
            username: redmine
            password: redmine
            encoding: utf8mb4
          EOF
        working-directory: redmine

      - name: Install gems
        run: bundle install
        working-directory: redmine

      - name: Populate test database
        run: |
          bundle exec rake db:migrate
        working-directory: redmine

      - name: Migrate plugins
        run: bundle exec rake redmine:plugins:migrate
        working-directory: redmine

      - name: Run RSpec tests
        run: |
          mkdir -p tmp/test-results
          bundle exec rspec plugins/$(basename "$GITHUB_WORKSPACE")/spec \
            --format progress
        working-directory: redmine
